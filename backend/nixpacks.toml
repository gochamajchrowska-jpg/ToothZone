# Railway używa Nixpacks do budowania — ten plik mówi mu żeby zainstalował
# zarówno Node.js jak i Python (potrzebny do skryptów email/płatności)

[phases.setup]
nixPkgs = ["nodejs_20", "python312"]

[phases.install]
cmds = [
  "npm install",
  "pip install -r requirements.txt"
]

[start]
cmd = "node server.js"
